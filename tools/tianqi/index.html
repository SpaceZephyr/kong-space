function setSky(themeKey, isDay, temp) {
  let key = themeKey + (isDay ? 'Day' : 'Night');
  if (themeKey === 'clear' && temp >= 35 && isDay) key = 'hot';
  document.body.style.background = THEMES[key] || THEMES.cloudDay;
  const sky = document.getElementById('sky');
  sky.innerHTML = '';
  const rnd = (a, b) => a + Math.random() * (b - a);
  if (themeKey === 'rain' || themeKey === 'storm') {
    for (let i = 0; i < 46; i++) { const d = document.createElement('div'); d.className = 'drop';
      d.style.left = rnd(0, 100) + 'vw'; d.style.animationDuration = rnd(0.7, 1.4) + 's'; d.style.animationDelay = rnd(0, 1.5) + 's'; sky.append(d); }
  } else if (themeKey === 'snow') {
    for (let i = 0; i < 34; i++) { const f = document.createElement('div'); f.className = 'flake'; f.textContent = '❄';
      f.style.left = rnd(0, 100) + 'vw'; f.style.fontSize = rnd(8, 18) + 'px'; f.style.animationDuration = rnd(4, 9) + 's'; f.style.animationDelay = rnd(0, 6) + 's'; sky.append(f); }
  } else if (themeKey === 'clear' && !isDay) {
    for (let i = 0; i < 60; i++) { const s = document.createElement('div'); s.className = 'star';
      s.style.left = rnd(0, 100) + 'vw'; s.style.top = rnd(0, 70) + 'vh'; s.style.animationDuration = rnd(1.5, 4) + 's'; s.style.animationDelay = rnd(0, 3) + 's'; sky.append(s); }
  } else if (themeKey === 'clear' && isDay) {
    const r = document.createElement('div'); r.className = 'sunray'; sky.append(r);
  } else if (themeKey === 'cloud' || themeKey === 'fog') {
    for (let i = 0; i < 4; i++) { const c = document.createElement('div'); c.className = 'cloud'; c.textContent = '☁️';
      c.style.top = rnd(4, 36) + 'vh'; c.style.animationDuration = rnd(50, 110) + 's'; c.style.animationDelay = '-' + rnd(0, 60) + 's'; sky.append(c); }
  }
}

  },
  wenyi: {
    hell:  ['<b>{t}°C</b>。蝉声把夏天拉到最满，连风都是烫的。','阳光倾泻如熔金，万物都在午后打盹。'],
    hot:   ['热浪推着云走，树影是街道仅存的温柔。','<b>{t}°C</b>，适合一杯冰镇的什么，和一段无所事事的时光。'],

    rainHigh: ['雨快来了（{rain}%）。听雨这件事，需要一把伞和一点闲心。','天色向晚，雨在云里排练，记得带伞去看这场演出。'],
    rainMid: ['云很低，也许有雨路过。折叠伞是给意外的浪漫留的座。'],
    windStrong: ['风很大，大到可以把烦恼吹到下一个街区。'],
    sticky: ['空气湿得能拧出一首朦胧诗。'],
    uvHigh: ['阳光过于热情，请以防晒回应它的告白。'],

  },
};

function tempBand(t) {
  if (t >= 37) return 'hell'; if (t >= 32) return 'hot'; if (t >= 26) return 'warm';
  if (t >= 18) return 'mild'; if (t >= 10) return 'cool'; if (t >= 0) return 'cold'; return 'freezing';
}

function makeTalk(tone, c) {
  const B = BANK[tone];
  const parts = [pick(B[tempBand(c.feels)])];
  if (c.rain >= 60) parts.push(pick(B.rainHigh));
  else if (c.rain >= 30) parts.push(pick(B.rainMid));
  if (c.wind >= 30) parts.push(pick(B.windStrong));
  if (c.hum >= 85 && c.feels >= 24) parts.push(pick(B.sticky));
  if (c.uv >= 8) parts.push(pick(B.uvHigh));
  parts.push(pick(B.closing));
  return parts.join(' ').replace(/\{t\}/g, Math.round(c.t)).replace(/\{feels\}/g, Math.round(c.feels))
    .replace(/\{rain\}/g, c.rain).replace(/\{wind\}/g, Math.round(c.wind)).replace(/\{hum\}/g, c.hum);
}

/* ================= 生活指数 ================= */
function indices(c, dailyRainMax3) {
  const out = [];
  const t = c.feels;
  out.push({ t: '👕 穿衣', v: t >= 30 ? '短袖短裤' : t >= 24 ? '短袖/薄衫' : t >= 18 ? '长袖单衣' : t >= 10 ? '外套/卫衣' : t >= 0 ? '毛衣+厚外套' : '羽绒服全套',
    d: t >= 30 ? '怎么凉快怎么来' : t >= 18 ? '早晚可加件外套' : t >= 0 ? '别硬扛，风度让位' : '秋裤不是可选项' });
  out.push({ t: '☔️ 带伞', v: c.rain >= 60 ? '必带' : c.rain >= 30 ? '备着' : '不用',
    d: c.rain >= 60 ? `降水概率 ${c.rain}%，别赌` : c.rain >= 30 ? `概率 ${c.rain}%，折叠伞塞包里` : '今天伞可以休息' });
  const runOK = t > 5 && t < 30 && c.rain < 40 && c.wind < 30;
  out.push({ t: '🏃 跑步', v: runOK ? '适宜' : '算了', d: runOK ? '这天气不跑可惜了' : t >= 30 ? '想跑等日落' : c.rain >= 40 ? '雨里跑的是热爱，不跑的是理智' : '风太大/太冷，改日' });
  const dryOK = c.hum < 70 && c.rain < 30 && c.isDay;
  out.push({ t: '🧺 晾晒', v: dryOK ? '快去' : '不宜', d: dryOK ? '阳光不要浪费，被子安排' : '晾了也是白晾，可能更湿' });
  out.push({ t: '🚗 洗车', v: dailyRainMax3 >= 50 ? '白洗' : '可以', d: dailyRainMax3 >= 50 ? `未来三天最高降水 ${dailyRainMax3}%，洗了就是给雨接风` : '近几天没大雨，洗了能新鲜几天' });
  out.push({ t: '🧋 奶茶', v: '永远适宜', d: t >= 28 ? '冰的，三分糖，谢谢' : t <= 10 ? '热的，捧在手里就是幸福' : '常温也行，主要是想喝' });
  return out;
}

const DAYQ = {
  clear: ['出门的好日子', '太阳营业，心情跟上', '晒被子黄金日'],
  cloud: ['云在加班，太阳摸鱼', '灰蒙蒙但不碍事', '适合发呆的天'],
  rain: ['带伞，别嘴硬', '雨天+好音乐=氛围感', '外卖平台的忙碌日'],
  snow: ['下雪了，记得抬头看看', '堆雪人窗口期', '路滑，慢点走'],
  fog: ['雾里看花的一天', '开车慢点，雾不讲理'],
  storm: ['雷雨预定，早点回家', '今天适合宅'],
};

/* ================= API ================= */
async function geocode(name) {
  const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=5&language=zh&format=json`);
  const j = await r.json();
  return (j.results || []).map(x => ({ name: x.name, admin: [x.admin1, x.country].filter(Boolean).join(' · '), lat: x.latitude, lon: x.longitude }));
}
async function forecast(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,weather_code,wind_speed_10m,precipitation` +
    `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,uv_index_max&timezone=auto&forecast_days=7`;
  const r = await fetch(url);
  return r.json();
}

/* ================= 主流程 ================= */
const $ = (s) => document.querySelector(s);
let tone = localStorage.getItem('tq-tone') || 'dushe';
let ctx = null; // 当前城市上下文
document.querySelectorAll('.tone').forEach(x => {
  x.classList.toggle('on', x.dataset.tone === tone);
  x.onclick = () => {
    tone = x.dataset.tone; localStorage.setItem('tq-tone', tone);
    document.querySelectorAll('.tone').forEach(y => y.classList.toggle('on', y === x));
    if (ctx) $('#talk-text').innerHTML = makeTalk(tone, ctx.c);
  };
});

function buildCtx(place, data) {
  const cur = data.current, d = data.daily;
  const [de, ne, desc, theme] = WMO[cur.weather_code] || ['🌡','🌡','未知','cloud'];
  const c = {
    t: cur.temperature_2m, feels: cur.apparent_temperature, hum: cur.relative_humidity_2m,
    wind: cur.wind_speed_10m, isDay: !!cur.is_day, code: cur.weather_code,
    rain: d.precipitation_probability_max[0] ?? 0, uv: d.uv_index_max[0] ?? 0,
    emoji: cur.is_day ? de : ne, desc, theme,
    tmax: d.temperature_2m_max[0], tmin: d.temperature_2m_min[0],
  };
  return { place, c, daily: d };
}

function comfortScore(c) {
  return Math.max(0, Math.round(100 - Math.abs(c.feels - 22) * 3 - c.rain * 0.35 - Math.max(0, c.wind - 20) * 1.2 - Math.max(0, c.hum - 70) * 0.4));
}

function render(x) {
  ctx = x;
  const { place, c, daily } = x;
  setSky(c.theme, c.isDay, c.t);
  $('#main').style.display = '';
  $('#now').innerHTML = `
    <div class="emoji">${c.emoji}</div>
    <div>
      <div class="place">${place}</div>
      <div class="temp">${Math.round(c.t)}°</div>
      <div class="desc">${c.desc} · 体感 ${Math.round(c.feels)}° · ${Math.round(c.tmin)}~${Math.round(c.tmax)}°</div>
      <div class="meta"><span>💧 湿度 ${c.hum}%</span><span>💨 风 ${Math.round(c.wind)}km/h</span><span>☔️ 降水 ${c.rain}%</span><span>😎 UV ${c.uv}</span></div>
    </div>`;
  $('#talk-text').innerHTML = makeTalk(tone, c);
  const rain3 = Math.max(...daily.precipitation_probability_max.slice(0, 3).map(v => v ?? 0));
  $('#idx').innerHTML = indices(c, rain3).map(i =>
    `<div class="idx"><div class="t">${i.t}</div><div class="v">${i.v}</div><div class="d">${i.d}</div></div>`).join('');
  const names = ['今天', '明天', '后天'];
  $('#days').innerHTML = daily.time.map((dt, i) => {
    const [de, , dsc, th] = WMO[daily.weather_code[i]] || ['🌡','','未知','cloud'];
    const dn = names[i] || '周' + '日一二三四五六'[new Date(dt + 'T00:00').getDay()];
    return `<div class="day"><span class="dn">${dn}</span><span class="de">${de}</span>
      <span class="dt">${Math.round(daily.temperature_2m_min[i])}° ~ ${Math.round(daily.temperature_2m_max[i])}°</span>
      <span class="dq">${dsc} · ${pick(DAYQ[th] || DAYQ.cloud)}${daily.precipitation_probability_max[i] >= 50 ? ' · 降水 ' + daily.precipitation_probability_max[i] + '%' : ''}</span></div>`;
  }).join('');
  $('#pkresult').innerHTML = '';
}

async function query(name) {
  if (!name) return;
  $('#status').textContent = '定位城市…';
  try {
    const places = await geocode(name);
    if (!places.length) { $('#status').textContent = '没找到这个城市，换个写法试试（支持中英文）'; return; }
    const p = places[0];
    $('#status').textContent = '获取天气…';
    const data = await forecast(p.lat, p.lon);
    render(buildCtx(p.name, data));
    localStorage.setItem('tq-city', name);
    $('#status').textContent = '';
  } catch (e) { $('#status').textContent = '查询失败：' + (e.message || e); }
}

$('#go').onclick = () => query($('#city').value.trim());
$('#city').addEventListener('keydown', e => { if (e.key === 'Enter') { $('#sugg').style.display = 'none'; query($('#city').value.trim()); } });
$('#retalk').onclick = () => { if (ctx) $('#talk-text').innerHTML = makeTalk(tone, ctx.c); };

// 输入联想
let st;
$('#city').addEventListener('input', () => {
  clearTimeout(st);
  const v = $('#city').value.trim();
  if (!v) { $('#sugg').style.display = 'none'; return; }
  st = setTimeout(async () => {
    const list = await geocode(v).catch(() => []);
    const box = $('#sugg');
    if (!list.length) { box.style.display = 'none'; return; }
    box.innerHTML = list.map((p, i) => `<div data-i="${i}">${p.name} <span style="color:#999;font-size:12px">${p.admin}</span></div>`).join('');
    box.style.display = 'block';
    box.querySelectorAll('div[data-i]').forEach(el => el.onclick = async () => {
      const p = list[+el.dataset.i];
      $('#city').value = p.name; box.style.display = 'none';
      $('#status').textContent = '获取天气…';
      const data = await forecast(p.lat, p.lon);
      render(buildCtx(p.name, data));
      $('#status').textContent = '';
    });
  }, 300);
});
document.addEventListener('click', e => { if (!e.target.closest('.searchbar')) $('#sugg').style.display = 'none'; });

/* ================= 城市 PK ================= */
$('#pkgo').onclick = async () => {
  const name = $('#pkcity').value.trim();
  if (!name || !ctx) return;
  $('#pkresult').innerHTML = '<p style="opacity:.8;margin-top:12px">对手入场中…</p>';
  try {
    const places = await geocode(name);
    if (!places.length) { $('#pkresult').innerHTML = '<p style="margin-top:12px">没找到对手城市</p>'; return; }
    const p = places[0];
    const data = await forecast(p.lat, p.lon);
    const rival = buildCtx(p.name, data);
    const a = { name: ctx.place, c: ctx.c, score: comfortScore(ctx.c) };
    const b = { name: rival.place, c: rival.c, score: comfortScore(rival.c) };
    const win = a.score === b.score ? null : (a.score > b.score ? a : b);
    const lose = win === a ? b : a;
    const verdicts = win === null
      ? [`${a.name} 和 ${b.name} 打成平手，今天出门体验都一言难尽（或都不错）。`]
      : [`🏆 <b>${win.name}</b> 以舒适度 ${win.score} : ${lose.score} 获胜——${lose.name} 的朋友，抱抱。`,
         `今天更适合出门的是 <b>${win.name}</b>（${win.score} 分）。${lose.name}（${lose.score} 分）建议室内活动。`];
    $('#pkresult').innerHTML = `<div class="pk-cols">` + [a, b].map(x => `
      <div class="pk-card"><div class="e">${x.c.emoji}</div><div class="n">${x.name}</div>
      <div class="s">${x.c.desc} · ${Math.round(x.c.t)}° · 体感 ${Math.round(x.c.feels)}° · 降水 ${x.c.rain}%</div>
      <div class="score">${x.score}<span style="font-size:13px;opacity:.7"> 分</span></div></div>`).join('') +
      `</div><div id="pk-verdict">${pick(verdicts)}</div>`;
  } catch (e) { $('#pkresult').innerHTML = '<p style="margin-top:12px">PK 失败：' + (e.message || e) + '</p>'; }
};
$('#pkcity').addEventListener('keydown', e => { if (e.key === 'Enter') $('#pkgo').click(); });

/* ================= 分享卡 ================= */
$('#share').onclick = async () => {
  if (!ctx) return;
  const { place, c } = ctx;
  const card = $('#share-card');
  let key = c.theme + (c.isDay ? 'Day' : 'Night');
  if (c.theme === 'clear' && c.t >= 35 && c.isDay) key = 'hot';
  card.style.background = THEMES[key] || THEMES.cloudDay;
  const today = new Date();
  card.innerHTML = `
    <div class="sc-city">${place}</div>
    <div class="sc-date">${today.getFullYear()}.${today.getMonth() + 1}.${today.getDate()} · ${'周' + '日一二三四五六'[today.getDay()]}</div>
    <div class="sc-emoji">${c.emoji}</div>
    <div class="sc-temp">${Math.round(c.t)}°</div>
    <div class="sc-desc">${c.desc} · 体感 ${Math.round(c.feels)}° · ${Math.round(c.tmin)}~${Math.round(c.tmax)}° · 降水 ${c.rain}%</div>
    <div class="sc-talk">${$('#talk-text').textContent}</div>
    <div class="sc-foot"><span>今天天气怎么样</span><span>kongge.space/tools/tianqi</span></div>`;
  $('#status').textContent = '生成分享卡…';
  const canvas = await html2canvas(card, { width: 1080, height: 1440, scale: 1, backgroundColor: null });
  const aEl = document.createElement('a');
  aEl.download = `${place}_天气_${today.getMonth() + 1}-${today.getDate()}.png`;
  aEl.href = canvas.toDataURL('image/png');
  aEl.click();
  $('#status').textContent = '已下载分享卡';
};

// 初始：记住上次城市
const last = localStorage.getItem('tq-city');
if (last) { $('#city').value = last; query(last); }
