<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML 预览 · 新窗口渲染</title>
<style>
  :root {
    --canvas: #ffffff;
    --canvas-soft: #f6f5f4;
    --ink: #000000;
    --ink-2: #31302e;
    --ink-muted: #615d59;
    --ink-faint: #a39e98;
    --hairline: #e6e6e6;
    --primary: #0075de;
    --primary-active: #005bab;
    --danger: #c2410c;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, Monaco, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: var(--sans);
    background: var(--canvas-soft);
    color: var(--ink-2);
    font-size: 15px;
  }

  .app {
    max-width: 1180px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }

  header.top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 18px;
    flex-wrap: wrap;
  }

  header.top h1 {
    color: var(--ink);
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header.top p {
    margin-top: 4px;
    color: var(--ink-muted);
    font-size: 14px;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0 16px;
    flex-wrap: wrap;
  }

  .btn {
    height: 38px;
    padding: 0 18px;
    border: none;
    border-radius: 9999px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }

  .btn-primary {
    background: var(--primary);
    color: #fff;
  }

  .btn-primary:hover { background: var(--primary-active); }

  .btn-secondary {
    border: 1px solid var(--hairline);
    background: var(--canvas);
    color: var(--ink);
  }

  .btn-secondary:hover { background: #fbfaf9; }

  .btn-danger {
    border: 1px solid #fed7aa;
    background: #fff7ed;
    color: var(--danger);
  }

  .spacer { flex: 1; }

  .status {
    min-height: 20px;
    color: var(--ink-muted);
    font-size: 13px;
  }

  .status.error { color: var(--danger); }

  .pane {
    overflow: hidden;
    border: 1px solid var(--hairline);
    border-radius: 12px;
    background: var(--canvas);
  }

  .pane-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--hairline);
    color: var(--ink-faint);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .count {
    color: var(--ink-faint);
    font-size: 12px;
    letter-spacing: 0;
    text-transform: none;
  }

  textarea {
    display: block;
    width: 100%;
    min-height: 72vh;
    border: none;
    outline: none;
    resize: vertical;
    padding: 18px;
    background: var(--canvas);
    color: var(--ink-2);
    font-family: var(--mono);
    font-size: 13.5px;
    line-height: 1.7;
    tab-size: 2;
  }

  textarea::placeholder { color: var(--ink-faint); }

  .blocked {
    display: none;
    margin-top: 12px;
    padding: 14px 16px;
    border: 1px solid #fed7aa;
    border-radius: 10px;
    background: #fff7ed;
    color: var(--danger);
    font-size: 14px;
    line-height: 1.6;
  }

  .blocked.show { display: block; }

  .blocked a {
    color: var(--danger);
    font-weight: 700;
  }

  @media (max-width: 720px) {
    .app { padding: 28px 18px 52px; }
    header.top { align-items: flex-start; }
    .toolbar { gap: 8px; }
    .btn { padding: 0 14px; }
    textarea { min-height: 66vh; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div>
      <h1>HTML 预览</h1>
      <p>粘贴 HTML，打开新窗口查看渲染结果。</p>
    </div>
  </header>

  <div class="toolbar">
    <button class="btn btn-primary" id="preview">预览</button>
    <button class="btn btn-secondary" id="sample">示例</button>
    <button class="btn btn-secondary" id="copy">复制</button>
    <button class="btn btn-danger" id="clear">清空</button>
    <span class="spacer"></span>
    <span class="status" id="status"></span>
  </div>

  <div class="pane">
    <div class="pane-head">
      <span>HTML</span>
      <span class="count" id="count">0 字符</span>
    </div>
    <textarea id="html" spellcheck="false" placeholder="在这里输入完整 HTML，或只输入一段 HTML 片段。"></textarea>
  </div>

  <div class="blocked" id="blocked"></div>
</div>

<script>
const $ = (s) => document.querySelector(s);
const input = $('#html');
const statusEl = $('#status');
const blockedEl = $('#blocked');

const SAMPLE = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预览示例</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f5f4;
      color: #222;
    }
    main {
      width: min(680px, calc(100vw - 40px));
      padding: 42px;
      border: 1px solid #e6e6e6;
      border-radius: 16px;
      background: #fff;
    }
    h1 { margin: 0 0 12px; font-size: 34px; }
    p { margin: 0; color: #615d59; line-height: 1.8; }
  </style>
</head>
<body>
  <main>
    <h1>Hello HTML</h1>
    <p>这是一页由 HTML 预览工具打开的新窗口。</p>
  </main>
</body>
</html>`;

function setStatus(msg, isError) {
  statusEl.textContent = msg || '';
  statusEl.className = 'status' + (isError ? ' error' : '');
}

function updateCount() {
  $('#count').textContent = input.value.length + ' 字符';
}

function normalizeHtml(raw) {
  const text = raw.trim();
  if (!text) return '';
  if (/<!doctype|<html[\s>]/i.test(text)) return text;
  return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Preview</title>
</head>
<body>
${text}
</body>
</html>`;
}

function makePreviewUrl(html) {
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  return URL.createObjectURL(blob);
}

function showBlocked(url) {
  blockedEl.innerHTML = `新窗口可能被浏览器拦截了：<a href="${url}" target="_blank" rel="noopener noreferrer">点击这里打开预览</a>`;
  blockedEl.classList.add('show');
}

$('#preview').onclick = () => {
  const html = normalizeHtml(input.value);
  if (!html) {
    setStatus('请先输入 HTML', true);
    return;
  }
  const url = makePreviewUrl(html);
  blockedEl.classList.remove('show');
  const win = window.open('about:blank', '_blank');
  if (!win) {
    showBlocked(url);
    setStatus('预览被拦截', true);
    return;
  }
  win.opener = null;
  win.location.href = url;
  setStatus('已打开预览');
  setTimeout(() => URL.revokeObjectURL(url), 60000);
};

$('#sample').onclick = () => {
  input.value = SAMPLE;
  updateCount();
  setStatus('已填入示例');
  input.focus();
};

$('#copy').onclick = async () => {
  if (!input.value) {
    setStatus('没有可复制的内容', true);
    return;
  }
  await navigator.clipboard.writeText(input.value);
  setStatus('已复制 HTML');
};

$('#clear').onclick = () => {
  input.value = '';
  updateCount();
  blockedEl.classList.remove('show');
  setStatus('已清空');
  input.focus();
};

input.addEventListener('input', updateCount);
updateCount();
</script>
</body>
</html>
