<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>万物皆可录 · 全屏演示录制</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root {
    --paper: #f7f7f4;
    --surface: #ffffff;
    --ink: #151515;
    --muted: #73736d;
    --line: #deded8;
    --blue: #1267d6;
    --blue-dark: #0b4fa9;
    --red: #e32f2f;
    --red-dark: #bd2020;
    --green: #147a51;
    --sans: "Avenir Next", Avenir, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100%; }
  body { overflow: hidden; background: var(--paper); color: var(--ink); font-family: var(--sans); }
  button, input { font: inherit; }
  button { letter-spacing: 0; }

  .upload-view {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 28px clamp(20px, 4vw, 64px);
    background:
      linear-gradient(rgba(21, 21, 21, .035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(21, 21, 21, .035) 1px, transparent 1px),
      var(--paper);
    background-size: 32px 32px;
  }
  .upload-view[hidden], .preview-view[hidden] { display: none; }
  .brand { display: flex; align-items: center; gap: 11px; font-size: 14px; font-weight: 700; }
  .brand-mark {
    display: grid; place-items: center; width: 28px; height: 28px;
    border: 2px solid var(--ink); border-radius: 50%; font-size: 11px;
  }
  .upload-main { width: min(660px, 100%); margin: auto; padding: 52px 0; }
  .eyebrow { color: var(--blue); font-family: var(--mono); font-size: 12px; font-weight: 700; text-transform: uppercase; }
  h1 { margin-top: 14px; font-size: clamp(36px, 6vw, 68px); line-height: 1.04; font-weight: 750; letter-spacing: 0; }
  .lead { max-width: 540px; margin-top: 18px; color: var(--muted); font-size: 16px; line-height: 1.75; }

  .drop-zone {
    position: relative; display: grid; place-items: center; min-height: 230px; margin-top: 34px;
    border: 1.5px dashed #aaa9a2; border-radius: 8px; background: rgba(255,255,255,.78);
    cursor: pointer; overflow: hidden; transition: border-color .18s, background .18s, transform .18s;
  }
  .drop-zone:hover, .drop-zone.drag { border-color: var(--blue); background: #fff; transform: translateY(-2px); }
  .drop-zone input { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
  .drop-content { padding: 32px; text-align: center; }
  .upload-icon {
    position: relative; display: block; width: 48px; height: 58px; margin: 0 auto 18px;
    border: 2px solid var(--ink); border-radius: 3px; background: #fff;
  }
  .upload-icon::before {
    content: ""; position: absolute; right: -2px; top: -2px; width: 15px; height: 15px;
    border-left: 2px solid var(--ink); border-bottom: 2px solid var(--ink); background: var(--paper);
  }
  .upload-icon::after { content: "+"; position: absolute; inset: 19px 0 0; font-size: 24px; font-weight: 400; }
  .drop-title { display: block; font-size: 18px; font-weight: 700; }
  .drop-help { display: block; margin-top: 8px; color: var(--muted); font-size: 13px; line-height: 1.6; }

  .file-choice {
    display: none; align-items: center; justify-content: space-between; gap: 18px;
    width: 100%; min-width: 0; padding: 22px 24px; text-align: left;
  }
  .drop-zone.has-file { min-height: 108px; }
  .drop-zone.has-file .drop-content { display: none; }
  .drop-zone.has-file .file-choice { display: flex; }
  .file-copy { min-width: 0; }
  .file-name { display: block; overflow: hidden; color: var(--ink); font-size: 16px; font-weight: 700; text-overflow: ellipsis; white-space: nowrap; }
  .file-meta { display: block; margin-top: 5px; color: var(--muted); font-family: var(--mono); font-size: 12px; }
  .replace-label { flex: 0 0 auto; color: var(--blue); font-size: 13px; font-weight: 700; }

  .confirm-row { display: flex; align-items: center; gap: 14px; margin-top: 16px; }
  .confirm-btn {
    width: 100%; height: 50px; border: 0; border-radius: 6px; color: #fff; background: var(--blue);
    font-weight: 700; cursor: pointer; transition: background .18s, transform .18s;
  }
  .confirm-btn:hover:not(:disabled) { background: var(--blue-dark); transform: translateY(-1px); }
  .confirm-btn:disabled { color: #999; background: #deded8; cursor: default; }
  .upload-foot { display: flex; justify-content: space-between; gap: 20px; color: var(--muted); font-size: 12px; }
  .upload-foot span:last-child { font-family: var(--mono); }

  .preview-view { position: fixed; inset: 0; background: #161616; }
  .stage { position: absolute; inset: 0; overflow: hidden; background: #fff; }
  .content { position: absolute; inset: 0; overflow: auto; padding: clamp(28px, 5vw, 72px); background: #fff; }
  .content.html-mode { padding: 0; }
  .content.pptx-mode, .content.pdf-mode { padding: clamp(20px, 3vw, 42px); background: #e9e9e6; }
  .loading {
    height: 100%; display: grid; place-items: center; color: #777; font-family: var(--mono);
    font-size: 13px; text-align: center;
  }
  .loading::before {
    content: ""; width: 26px; height: 26px; margin: 0 auto 14px; display: block;
    border: 2px solid #ccc; border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .doc { max-width: 880px; margin: 0 auto; color: #242424; font-size: 18px; line-height: 1.78; }
  .doc h1, .doc h2, .doc h3 { color: #111; line-height: 1.3; margin: 1.25em 0 .58em; letter-spacing: 0; }
  .doc h1 { margin-top: 0; font-size: 42px; }
  .doc h2 { padding-top: 20px; border-top: 1px solid #e6e6e2; font-size: 29px; }
  .doc h3 { font-size: 22px; }
  .doc p, .doc ul, .doc ol, .doc blockquote, .doc pre, .doc table { margin-bottom: 1em; }
  .doc ul, .doc ol { padding-left: 1.4em; }
  .doc img { max-width: 100%; height: auto; }
  .doc code { padding: 2px 5px; border-radius: 3px; background: #f0f0ed; font-family: var(--mono); font-size: .9em; }
  .doc pre { overflow: auto; padding: 18px; border-radius: 6px; color: #f5f5f3; background: #1d1d1d; }
  .doc pre code { padding: 0; color: inherit; background: transparent; }
  .doc blockquote { padding-left: 18px; border-left: 4px solid #bbb; color: #666; }
  .doc table { width: 100%; border-collapse: collapse; }
  .doc th, .doc td { padding: 9px 11px; border: 1px solid #ddd; text-align: left; }
  .html-doc { width: 100%; min-height: 100%; padding: clamp(24px, 4vw, 56px); background: #fff; }
  .pdf-page { display: block; max-width: 100%; height: auto; margin: 0 auto 28px; background: #fff; box-shadow: 0 5px 24px rgba(0,0,0,.13); }
  #pptxMount { width: 100%; min-height: 100%; }

  .camera {
    position: absolute; z-index: 2; right: clamp(18px, 3vw, 38px); bottom: clamp(18px, 3vw, 38px);
    width: clamp(140px, 14.5vw, 240px); aspect-ratio: 5 / 4; overflow: hidden;
    border: 3px solid rgba(255,255,255,.96); border-radius: 24px; background: #181818;
    box-shadow: 0 12px 38px rgba(0,0,0,.26);
  }
  .camera video {
    display: block; width: 100%; height: 100%; object-fit: cover; object-position: 50% 46%;
    transform: scaleX(-1) scale(1.18); transform-origin: 50% 46%;
  }
  .camera-empty { height: 100%; display: grid; place-items: center; padding: 14px; color: rgba(255,255,255,.68); font-size: 12px; text-align: center; }

  .hud { position: fixed; z-index: 20; display: flex; align-items: center; pointer-events: none; }
  .hud > * { pointer-events: auto; }
  .hud-left { top: 18px; left: 18px; max-width: calc(100vw - 420px); }
  .hud-right { top: 18px; right: 18px; gap: 8px; }
  .hud-bottom { left: 18px; bottom: 18px; }
  .status-chip, .control-group, .result-chip {
    border: 1px solid rgba(255,255,255,.16); background: rgba(20,20,20,.90); color: #fff;
    box-shadow: 0 8px 26px rgba(0,0,0,.24); backdrop-filter: blur(14px);
  }
  .status-chip { min-width: 0; padding: 10px 13px; border-radius: 6px; }
  .stage-file { display: block; overflow: hidden; max-width: 340px; font-size: 13px; font-weight: 700; text-overflow: ellipsis; white-space: nowrap; }
  .stage-status { display: block; margin-top: 3px; color: rgba(255,255,255,.62); font-family: var(--mono); font-size: 10px; }
  .stage-status.error { color: #ff9292; }
  .stage-status.ok { color: #8fe2bd; }
  .control-group { display: flex; align-items: center; gap: 6px; padding: 6px; border-radius: 7px; }
  .control-btn {
    height: 36px; padding: 0 13px; border: 0; border-radius: 4px; color: #fff; background: transparent;
    font-size: 13px; font-weight: 650; cursor: pointer; white-space: nowrap;
  }
  .control-btn:hover:not(:disabled) { background: rgba(255,255,255,.12); }
  .control-btn:disabled { opacity: .44; cursor: default; }
  .record-btn { background: var(--red); }
  .record-btn:hover:not(:disabled) { background: var(--red-dark); }
  .stop-btn { background: #fff; color: #151515; }
  .stop-btn:hover:not(:disabled) { background: #ededeb; }
  .download-btn { background: var(--blue); }
  .download-btn:hover:not(:disabled) { background: var(--blue-dark); }
  .recording-pill {
    display: none; align-items: center; gap: 8px; height: 36px; padding: 0 12px;
    border-radius: 4px; color: #fff; background: var(--red); font-family: var(--mono); font-size: 12px;
  }
  .recording-pill.show { display: flex; }
  .recording-dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; animation: blink 1.1s ease-in-out infinite; }
  @keyframes blink { 50% { opacity: .25; } }
  .result-chip { display: none; align-items: center; gap: 14px; padding: 8px 9px 8px 13px; border-radius: 7px; }
  .result-chip.show { display: flex; }
  .result-copy { color: rgba(255,255,255,.72); font-family: var(--mono); font-size: 11px; }

  .teleprompter {
    position: fixed; z-index: 19; top: 72px; right: 18px; width: min(360px, calc(100vw - 36px));
    max-height: 62vh; overflow: hidden; border: 1px solid rgba(255,255,255,.18); border-radius: 8px;
    color: #fff; background: rgba(16,16,16,.94); box-shadow: 0 18px 46px rgba(0,0,0,.34);
    backdrop-filter: blur(16px);
  }
  .teleprompter[hidden] { display: none; }
  .prompter-head { display: flex; align-items: center; gap: 8px; height: 46px; padding: 0 8px 0 14px; border-bottom: 1px solid rgba(255,255,255,.12); }
  .prompter-title { flex: 1; font-size: 13px; font-weight: 700; }
  .prompter-icon {
    display: grid; place-items: center; width: 30px; height: 30px; border: 0; border-radius: 4px;
    color: rgba(255,255,255,.72); background: transparent; font-size: 18px; cursor: pointer;
  }
  .prompter-icon:hover { color: #fff; background: rgba(255,255,255,.1); }
  .prompter-body { display: flex; flex-direction: column; max-height: calc(62vh - 46px); }
  .teleprompter.collapsed .prompter-head { border-bottom: 0; }
  .teleprompter.collapsed .prompter-body { display: none; }
  .prompter-edit, .prompter-read { display: flex; flex-direction: column; min-height: 0; }
  .prompter-edit[hidden], .prompter-read[hidden] { display: none; }
  .script-input {
    width: 100%; min-height: 250px; max-height: calc(62vh - 110px); padding: 18px; resize: vertical;
    border: 0; outline: 0; color: #f5f5f3; background: transparent; font: 500 18px/1.8 var(--sans);
  }
  .script-input::placeholder { color: rgba(255,255,255,.38); }
  .prompter-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 10px; border-top: 1px solid rgba(255,255,255,.12); }
  .prompter-btn {
    height: 34px; padding: 0 12px; border: 1px solid rgba(255,255,255,.18); border-radius: 4px;
    color: #fff; background: transparent; font-size: 12px; font-weight: 650; cursor: pointer;
  }
  .prompter-btn:hover { background: rgba(255,255,255,.1); }
  .prompter-btn.primary { border-color: var(--blue); background: var(--blue); }
  .prompter-btn.primary:hover { background: var(--blue-dark); }
  .script-reader {
    min-height: 250px; overflow-y: auto; padding: 22px 22px 40px; color: #fff;
    white-space: pre-wrap; overflow-wrap: anywhere; font-size: 22px; font-weight: 650; line-height: 1.85;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.3) transparent;
  }
  .prompter-toolbar { display: flex; align-items: center; gap: 7px; padding: 9px 10px; border-top: 1px solid rgba(255,255,255,.12); }
  .speed-group { display: flex; align-items: center; padding: 2px; border: 1px solid rgba(255,255,255,.16); border-radius: 5px; }
  .speed-btn {
    width: 34px; height: 28px; border: 0; border-radius: 3px; color: rgba(255,255,255,.58);
    background: transparent; font-size: 11px; cursor: pointer;
  }
  .speed-btn[aria-pressed="true"] { color: #111; background: #fff; font-weight: 700; }
  .scroll-btn { flex: 1; }
  #recordCanvas { display: none; }

  @media (max-width: 720px) {
    .upload-view { padding: 20px; }
    .upload-main { padding: 30px 0; }
    h1 { font-size: 40px; }
    .drop-zone { min-height: 210px; }
    .upload-foot { display: none; }
    .camera { right: 12px; bottom: 86px; width: 28vw; min-width: 110px; border-radius: 18px; }
    .hud-left { top: 12px; left: 12px; max-width: calc(100vw - 24px); }
    .hud-right { top: auto; right: 12px; bottom: 12px; max-width: calc(100vw - 24px); }
    .hud-bottom { left: 12px; bottom: 62px; }
    .stage-file { max-width: 190px; }
    .control-btn { padding: 0 10px; }
    .control-btn .wide-label { display: none; }
    .teleprompter { top: auto; right: 12px; bottom: 66px; width: calc(100vw - 24px); max-height: 48vh; }
    .prompter-body { max-height: calc(48vh - 46px); }
    .script-input, .script-reader { min-height: 180px; max-height: calc(48vh - 110px); }
    .script-reader { font-size: 19px; }
  }
</style>
  <script src="/nav.js" defer></script>
</head>
<body>
<main class="upload-view" id="uploadView">
  <div class="brand"><span class="brand-mark">REC</span><span>万物皆可录</span></div>

  <section class="upload-main" aria-labelledby="uploadTitle">
    <div class="eyebrow">Local presentation recorder</div>
    <h1 id="uploadTitle">把文件放进来，<br>直接开始讲。</h1>
    <p class="lead">选择 PPTX、HTML、PDF 或 Markdown 文件。内容只在你的浏览器中处理，确认后进入全屏预览。</p>

    <label class="drop-zone" id="dropZone">
      <input id="fileInput" type="file" accept=".pptx,.html,.htm,.pdf,.md,.markdown,text/html,text/markdown,application/pdf">
      <span class="drop-content">
        <span class="upload-icon" aria-hidden="true"></span>
        <span class="drop-title">选择或拖入文件</span>
        <span class="drop-help">PPTX / HTML / PDF / Markdown<br>文件不会上传到服务器</span>
      </span>
      <span class="file-choice">
        <span class="file-copy">
          <span class="file-name" id="selectedName"></span>
          <span class="file-meta" id="selectedMeta"></span>
        </span>
        <span class="replace-label">重新选择</span>
      </span>
    </label>

    <div class="confirm-row">
      <button class="confirm-btn" id="confirmBtn" type="button" disabled>确认并全屏预览</button>
    </div>
  </section>

  <footer class="upload-foot"><span>本地渲染 · 摄像头画面 · 麦克风音频</span><span>MP4 / WebM</span></footer>
</main>

<main class="preview-view" id="previewView" hidden>
  <section class="stage" id="stage" aria-label="录制舞台">
    <div class="content" id="content"><div class="loading">正在准备预览</div></div>
    <div class="camera" id="cameraBox"><div class="camera-empty">正在等待摄像头</div></div>
  </section>

  <div class="hud hud-left" data-html2canvas-ignore="true">
    <div class="status-chip">
      <span class="stage-file" id="stageFile">未选择文件</span>
      <span class="stage-status" id="stageStatus">正在准备</span>
    </div>
  </div>

  <div class="hud hud-right" data-html2canvas-ignore="true">
    <div class="recording-pill" id="recordingPill"><span class="recording-dot"></span><span id="timer">00:00</span></div>
    <div class="control-group">
      <button class="control-btn" id="backBtn" type="button" title="返回选择文件">返回</button>
      <button class="control-btn" id="cameraBtn" type="button" title="开启或关闭个人摄像头" aria-pressed="false">开启摄像头</button>
      <button class="control-btn record-btn" id="recordBtn" type="button" disabled>开始录制</button>
      <button class="control-btn stop-btn" id="stopBtn" type="button" hidden>结束</button>
      <button class="control-btn" id="scriptBtn" type="button" aria-expanded="false" aria-controls="teleprompter">口播脚本</button>
    </div>
  </div>

  <aside class="teleprompter" id="teleprompter" data-html2canvas-ignore="true" hidden>
    <header class="prompter-head">
      <span class="prompter-title">口播提词器</span>
      <button class="prompter-icon" id="collapseScriptBtn" type="button" title="收起提词器" aria-label="收起提词器">&minus;</button>
      <button class="prompter-icon" id="closeScriptBtn" type="button" title="关闭提词器" aria-label="关闭提词器">&times;</button>
    </header>
    <div class="prompter-body">
      <div class="prompter-edit" id="prompterEdit">
        <textarea class="script-input" id="scriptInput" placeholder="把口播脚本粘贴到这里。录制时，提词器只对你可见。"></textarea>
        <div class="prompter-actions">
          <button class="prompter-btn primary" id="readScriptBtn" type="button">开始提词</button>
        </div>
      </div>
      <div class="prompter-read" id="prompterRead" hidden>
        <div class="script-reader" id="scriptReader" tabindex="0"></div>
        <div class="prompter-toolbar">
          <div class="speed-group" aria-label="自动滚动速度">
            <button class="speed-btn" type="button" data-speed="slow" aria-pressed="false">慢</button>
            <button class="speed-btn" type="button" data-speed="medium" aria-pressed="true">中</button>
            <button class="speed-btn" type="button" data-speed="fast" aria-pressed="false">快</button>
          </div>
          <button class="prompter-btn scroll-btn" id="scrollScriptBtn" type="button" aria-pressed="false">自动滚动</button>
          <button class="prompter-btn" id="editScriptBtn" type="button">编辑</button>
        </div>
      </div>
    </div>
  </aside>

  <div class="hud hud-bottom" data-html2canvas-ignore="true">
    <div class="result-chip" id="resultChip">
      <span class="result-copy" id="resultInfo"></span>
      <button class="control-btn download-btn" id="downloadBtn" type="button">下载视频</button>
    </div>
  </div>
</main>

<canvas id="recordCanvas"></canvas>

<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs';
import { init as initPptx } from 'https://esm.sh/pptx-preview@1.0.7';

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.mjs';
const markedLib = window.marked;
const html2canvasLib = window.html2canvas;
const $ = (selector) => document.querySelector(selector);

const uploadView = $('#uploadView');
const previewView = $('#previewView');
const dropZone = $('#dropZone');
const stage = $('#stage');
const content = $('#content');
const cameraBox = $('#cameraBox');
const recordCanvas = $('#recordCanvas');
const rctx = recordCanvas.getContext('2d', { alpha: false });

let selectedFile = null;
let contentReady = false;
let microphoneStream = null;
let cameraStream = null;
let cameraVideo = null;
let mediaRecorder = null;
let canvasStream = null;
let chunks = [];
let drawLoopActive = false;
let startedAt = 0;
let timerTick = null;
let lastBlob = null;
let lastMime = '';
let lastExt = 'webm';
let currentName = 'recording';
let promptMode = 'edit';
let promptSpeed = 'medium';
let promptFrame = 0;
let promptLastFrame = 0;
let promptRunning = false;

const AUDIO_CONSTRAINTS = { echoCancellation: true, noiseSuppression: true };
const VIDEO_CONSTRAINTS = { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } };
const PROMPT_SPEEDS = { slow: 18, medium: 32, fast: 52 };

function fmtBytes(bytes) {
  const units = ['B', 'KB', 'MB', 'GB'];
  let value = bytes || 0;
  let index = 0;
  while (value >= 1024 && index < units.length - 1) { value /= 1024; index += 1; }
  return value.toFixed(index ? 2 : 0) + ' ' + units[index];
}

function safeName(name) {
  return (name || 'recording').replace(/\.[^.]+$/, '').replace(/[\\/:*?"<>|\s]+/g, '_').slice(0, 48) || 'recording';
}

function setStageStatus(message, type = '') {
  const el = $('#stageStatus');
  el.textContent = message;
  el.className = 'stage-status' + (type ? ' ' + type : '');
}

function setRenderMode(mode = '') {
  content.className = 'content' + (mode ? ' ' + mode + '-mode' : '');
}

function hasLiveTrack(stream, kind) {
  if (!stream) return false;
  const tracks = kind === 'audio' ? stream.getAudioTracks() : stream.getVideoTracks();
  return tracks.some((track) => track.readyState === 'live');
}

function isRecording() {
  return mediaRecorder?.state === 'recording';
}

function stopPromptScroll() {
  promptRunning = false;
  cancelAnimationFrame(promptFrame);
  promptFrame = 0;
  $('#scrollScriptBtn').textContent = '自动滚动';
  $('#scrollScriptBtn').setAttribute('aria-pressed', 'false');
}

function runPromptFrame(time) {
  if (!promptRunning) return;
  if (!promptLastFrame) promptLastFrame = time;
  const delta = Math.min(48, time - promptLastFrame);
  promptLastFrame = time;
  const reader = $('#scriptReader');
  reader.scrollTop += PROMPT_SPEEDS[promptSpeed] * delta / 1000;
  if (reader.scrollTop + reader.clientHeight >= reader.scrollHeight - 1) {
    stopPromptScroll();
    return;
  }
  promptFrame = requestAnimationFrame(runPromptFrame);
}

function startPromptScroll() {
  const reader = $('#scriptReader');
  if (reader.scrollHeight <= reader.clientHeight + 1) return;
  if (reader.scrollTop + reader.clientHeight >= reader.scrollHeight - 1) reader.scrollTop = 0;
  promptRunning = true;
  promptLastFrame = 0;
  $('#scrollScriptBtn').textContent = '暂停滚动';
  $('#scrollScriptBtn').setAttribute('aria-pressed', 'true');
  promptFrame = requestAnimationFrame(runPromptFrame);
}

function setPrompterMode(mode) {
  promptMode = mode;
  stopPromptScroll();
  const editing = mode === 'edit';
  $('#prompterEdit').hidden = !editing;
  $('#prompterRead').hidden = editing;
  if (editing) {
    requestAnimationFrame(() => $('#scriptInput').focus());
  } else {
    $('#scriptReader').textContent = $('#scriptInput').value.trim();
    $('#scriptReader').scrollTop = 0;
  }
}

function setPrompterOpen(open) {
  const panel = $('#teleprompter');
  panel.hidden = !open;
  $('#scriptBtn').setAttribute('aria-expanded', String(open));
  if (!open) {
    stopPromptScroll();
    panel.classList.remove('collapsed');
    $('#collapseScriptBtn').innerHTML = '&minus;';
    $('#collapseScriptBtn').title = '收起提词器';
    return;
  }
  if (promptMode === 'edit') requestAnimationFrame(() => $('#scriptInput').focus());
}

function togglePrompterCollapse() {
  const panel = $('#teleprompter');
  const collapsed = panel.classList.toggle('collapsed');
  if (collapsed) stopPromptScroll();
  $('#collapseScriptBtn').textContent = collapsed ? '+' : '−';
  $('#collapseScriptBtn').title = collapsed ? '展开提词器' : '收起提词器';
  $('#collapseScriptBtn').setAttribute('aria-label', collapsed ? '展开提词器' : '收起提词器');
}

function clearContent(mode = '') {
  content.innerHTML = '';
  setRenderMode(mode);
}

function sanitizeHtml(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  doc.querySelectorAll('script, iframe, object, embed, base').forEach((element) => element.remove());
  doc.querySelectorAll('*').forEach((element) => {
    for (const attribute of [...element.attributes]) {
      if (/^on/i.test(attribute.name) || (/^(href|src)$/i.test(attribute.name) && /^javascript:/i.test(attribute.value.trim()))) {
        element.removeAttribute(attribute.name);
      }
    }
  });
  const styles = [...doc.head.querySelectorAll('style')].map((style) => style.outerHTML).join('');
  return styles + doc.body.innerHTML;
}

async function renderMarkdown(text) {
  clearContent();
  const article = document.createElement('article');
  article.className = 'doc';
  article.innerHTML = markedLib.parse(text);
  content.append(article);
}

async function renderHtml(text) {
  clearContent('html');
  const wrap = document.createElement('div');
  wrap.className = 'html-doc';
  wrap.innerHTML = sanitizeHtml(text);
  content.append(wrap);
}

async function renderPdf(buffer) {
  clearContent('pdf');
  const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
  for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
    setStageStatus('正在渲染 PDF · ' + pageNumber + ' / ' + pdf.numPages);
    const page = await pdf.getPage(pageNumber);
    const natural = page.getViewport({ scale: 1 });
    const scale = Math.min(2, 1200 / natural.width);
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.className = 'pdf-page';
    canvas.width = Math.floor(viewport.width);
    canvas.height = Math.floor(viewport.height);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    content.append(canvas);
  }
}

async function renderPptx(buffer) {
  clearContent('pptx');
  const mount = document.createElement('div');
  mount.id = 'pptxMount';
  content.append(mount);
  const width = Math.min(1280, Math.max(720, window.innerWidth - 80));
  const viewer = initPptx(mount, { width, height: Math.round(width * 9 / 16) });
  await viewer.preview(buffer);
}

async function renderSelectedFile() {
  const file = selectedFile;
  const name = file.name.toLowerCase();
  if (name.endsWith('.pdf') || file.type === 'application/pdf') {
    await renderPdf(await file.arrayBuffer());
  } else if (name.endsWith('.pptx')) {
    await renderPptx(await file.arrayBuffer());
  } else if (name.endsWith('.html') || name.endsWith('.htm') || file.type === 'text/html') {
    await renderHtml(await file.text());
  } else {
    await renderMarkdown(await file.text());
  }
}

function chooseFile(file) {
  if (!file) return;
  selectedFile = file;
  currentName = safeName(file.name);
  $('#selectedName').textContent = file.name;
  $('#selectedMeta').textContent = fmtBytes(file.size) + ' · 本地文件';
  dropZone.classList.add('has-file');
  $('#confirmBtn').disabled = false;
}

async function enterPreview() {
  if (!selectedFile) return;
  contentReady = false;
  lastBlob = null;
  $('#resultChip').classList.remove('show');
  $('#stageFile').textContent = selectedFile.name;
  setStageStatus('正在渲染预览');
  uploadView.hidden = true;
  previewView.hidden = false;
  content.innerHTML = '<div class="loading">正在渲染文件</div>';
  setRenderMode();

  try {
    await renderSelectedFile();
    contentReady = true;
    setStageStatus('预览就绪 · 内容仅在本地处理', 'ok');
    $('#recordBtn').disabled = false;
    await initializeMedia();
  } catch (error) {
    content.innerHTML = '<div class="loading">文件渲染失败</div>';
    setStageStatus('渲染失败：' + (error.message || error), 'error');
  }
}

async function mountCameraVideo() {
  cameraVideo = document.createElement('video');
  cameraVideo.muted = true;
  cameraVideo.autoplay = true;
  cameraVideo.playsInline = true;
  cameraVideo.srcObject = cameraStream;
  cameraBox.innerHTML = '';
  cameraBox.hidden = false;
  cameraBox.append(cameraVideo);
  await cameraVideo.play();
  $('#cameraBtn').textContent = '关闭摄像头';
  $('#cameraBtn').setAttribute('aria-pressed', 'true');
}

async function ensureMicrophone() {
  if (hasLiveTrack(microphoneStream, 'audio')) return true;
  const stream = await navigator.mediaDevices.getUserMedia({ video: false, audio: AUDIO_CONSTRAINTS });
  microphoneStream = new MediaStream(stream.getAudioTracks());
  return hasLiveTrack(microphoneStream, 'audio');
}

async function enableCamera(automatic = false) {
  if (hasLiveTrack(cameraStream, 'video')) return true;
  if (!navigator.mediaDevices?.getUserMedia) {
    setStageStatus('当前浏览器不支持摄像头', 'error');
    return false;
  }
  setStageStatus(automatic ? '预览就绪 · 正在请求摄像头权限' : '正在开启摄像头');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: VIDEO_CONSTRAINTS, audio: false });
    cameraStream = new MediaStream(stream.getVideoTracks());
    await mountCameraVideo();
    setStageStatus(isRecording() ? '录制中 · 摄像头已开启' : '预览就绪 · 摄像头已开启', 'ok');
    return true;
  } catch (error) {
    $('#cameraBtn').textContent = '开启摄像头';
    $('#cameraBtn').setAttribute('aria-pressed', 'false');
    setStageStatus('未开启摄像头：' + (error.message || error), 'error');
    return false;
  }
}

function disableCamera() {
  if (cameraStream) cameraStream.getTracks().forEach((track) => track.stop());
  cameraStream = null;
  cameraVideo = null;
  cameraBox.innerHTML = '';
  cameraBox.hidden = true;
  $('#cameraBtn').textContent = '开启摄像头';
  $('#cameraBtn').setAttribute('aria-pressed', 'false');
  setStageStatus(
    isRecording() ? '录制中 · 摄像头已关闭，麦克风继续录音' : '预览就绪 · 摄像头已关闭，麦克风保持开启',
    'ok'
  );
}

async function initializeMedia() {
  if (!navigator.mediaDevices?.getUserMedia) {
    cameraBox.hidden = true;
    setStageStatus('预览就绪 · 当前浏览器不支持摄像头或麦克风', 'error');
    return;
  }
  setStageStatus('预览就绪 · 正在请求摄像头和麦克风权限');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: VIDEO_CONSTRAINTS, audio: AUDIO_CONSTRAINTS });
    microphoneStream = new MediaStream(stream.getAudioTracks());
    cameraStream = new MediaStream(stream.getVideoTracks());
    await mountCameraVideo();
    setStageStatus('预览就绪 · 摄像头和麦克风已开启', 'ok');
  } catch (combinedError) {
    disableCamera();
    try {
      await ensureMicrophone();
      setStageStatus('预览就绪 · 麦克风已开启，摄像头未开启', 'ok');
    } catch (audioError) {
      setStageStatus('预览就绪 · 未开启摄像头和麦克风', 'error');
    }
  }
}

function releaseMedia() {
  if (cameraStream) cameraStream.getTracks().forEach((track) => track.stop());
  if (microphoneStream) microphoneStream.getTracks().forEach((track) => track.stop());
  cameraStream = null;
  microphoneStream = null;
  cameraVideo = null;
  cameraBox.innerHTML = '<div class="camera-empty">正在等待摄像头</div>';
  cameraBox.hidden = false;
  $('#cameraBtn').textContent = '开启摄像头';
  $('#cameraBtn').setAttribute('aria-pressed', 'false');
}

function chooseMime() {
  const choices = [
    ['video/mp4;codecs=h264,aac', 'mp4'],
    ['video/mp4', 'mp4'],
    ['video/webm;codecs=vp9,opus', 'webm'],
    ['video/webm;codecs=vp8,opus', 'webm'],
    ['video/webm', 'webm']
  ];
  for (const [mime, ext] of choices) {
    if (MediaRecorder.isTypeSupported(mime)) return { mime, ext };
  }
  return { mime: '', ext: 'webm' };
}

function roundRect(ctx, x, y, width, height, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.arcTo(x + width, y, x + width, y + height, radius);
  ctx.arcTo(x + width, y + height, x, y + height, radius);
  ctx.arcTo(x, y + height, x, y, radius);
  ctx.arcTo(x, y, x + width, y, radius);
  ctx.closePath();
}

function drawCameraOverlay(width, height) {
  if (!cameraVideo || cameraVideo.readyState < 2) return;
  const stageRect = stage.getBoundingClientRect();
  const cameraRect = cameraBox.getBoundingClientRect();
  const scaleX = width / stageRect.width;
  const scaleY = height / stageRect.height;
  const outerX = Math.round((cameraRect.left - stageRect.left) * scaleX);
  const outerY = Math.round((cameraRect.top - stageRect.top) * scaleY);
  const outerWidth = Math.round(cameraRect.width * scaleX);
  const outerHeight = Math.round(cameraRect.height * scaleY);
  const border = Math.max(3, Math.round(3 * scaleX));
  const x = outerX + border;
  const y = outerY + border;
  const camWidth = outerWidth - border * 2;
  const camHeight = outerHeight - border * 2;
  const outerRadius = Math.max(16, Math.round(cameraRect.width * .1 * scaleX));
  const innerRadius = Math.max(12, outerRadius - border);

  const videoWidth = cameraVideo.videoWidth;
  const videoHeight = cameraVideo.videoHeight;
  const targetAspect = camWidth / camHeight;
  let sourceWidth = videoWidth;
  let sourceHeight = videoHeight;
  if (videoWidth / videoHeight > targetAspect) {
    sourceWidth = videoHeight * targetAspect;
  } else {
    sourceHeight = videoWidth / targetAspect;
  }
  const zoom = 1.18;
  sourceWidth /= zoom;
  sourceHeight /= zoom;
  const centerX = videoWidth * .5;
  const centerY = videoHeight * .46;
  const sourceX = Math.max(0, Math.min(videoWidth - sourceWidth, centerX - sourceWidth / 2));
  const sourceY = Math.max(0, Math.min(videoHeight - sourceHeight, centerY - sourceHeight / 2));

  rctx.save();
  rctx.shadowColor = 'rgba(0,0,0,.28)';
  rctx.shadowBlur = Math.round(width * .016);
  rctx.fillStyle = '#fff';
  roundRect(rctx, outerX, outerY, outerWidth, outerHeight, outerRadius);
  rctx.fill();
  rctx.shadowBlur = 0;
  roundRect(rctx, x, y, camWidth, camHeight, innerRadius);
  rctx.clip();
  rctx.translate(x + camWidth, y);
  rctx.scale(-1, 1);
  rctx.drawImage(cameraVideo, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, camWidth, camHeight);
  rctx.restore();
}

async function drawStageFrame() {
  const rect = stage.getBoundingClientRect();
  const scale = Math.min(1.5, Math.max(1, window.devicePixelRatio || 1));
  const width = Math.round(rect.width * scale);
  const height = Math.round(rect.height * scale);
  if (recordCanvas.width !== width || recordCanvas.height !== height) {
    recordCanvas.width = width;
    recordCanvas.height = height;
  }
  const snapshot = await html2canvasLib(stage, {
    backgroundColor: '#ffffff',
    width: rect.width,
    height: rect.height,
    scale,
    useCORS: true,
    logging: false,
    ignoreElements: (element) => element.id === 'cameraBox' || element.hasAttribute('data-html2canvas-ignore')
  });
  rctx.fillStyle = '#fff';
  rctx.fillRect(0, 0, width, height);
  rctx.drawImage(snapshot, 0, 0, width, height);
  drawCameraOverlay(width, height);
}

async function runDrawLoop() {
  while (drawLoopActive) {
    const frameStartedAt = performance.now();
    try { await drawStageFrame(); } catch (error) { console.warn('Frame capture failed', error); }
    const elapsed = performance.now() - frameStartedAt;
    await new Promise((resolve) => setTimeout(resolve, Math.max(0, 100 - elapsed)));
  }
}

function updateTimer() {
  const seconds = Math.floor((Date.now() - startedAt) / 1000);
  const minutes = String(Math.floor(seconds / 60)).padStart(2, '0');
  const remainder = String(seconds % 60).padStart(2, '0');
  $('#timer').textContent = minutes + ':' + remainder;
}

async function startRecording() {
  if (!contentReady) return;
  try {
    $('#recordBtn').hidden = true;
    $('#stopBtn').hidden = false;
    $('#backBtn').disabled = true;
    $('#resultChip').classList.remove('show');
    $('#recordingPill').classList.add('show');
    chunks = [];
    await drawStageFrame();

    canvasStream = recordCanvas.captureStream(30);
    microphoneStream?.getAudioTracks()
      .filter((track) => track.readyState === 'live')
      .forEach((track) => canvasStream.addTrack(track));
    const picked = chooseMime();
    lastMime = picked.mime || 'video/webm';
    lastExt = picked.ext;
    mediaRecorder = new MediaRecorder(canvasStream, {
      mimeType: picked.mime || undefined,
      videoBitsPerSecond: 4500000,
      audioBitsPerSecond: 128000
    });
    mediaRecorder.ondataavailable = (event) => { if (event.data?.size) chunks.push(event.data); };
    mediaRecorder.onstop = finishRecording;
    mediaRecorder.start(1000);
    drawLoopActive = true;
    runDrawLoop();
    startedAt = Date.now();
    timerTick = setInterval(updateTimer, 250);
    updateTimer();
    setStageStatus('录制中 · 可滚动或翻页演示', 'ok');
  } catch (error) {
    resetRecordingControls();
    setStageStatus('录制启动失败：' + (error.message || error), 'error');
  }
}

function stopRecording() {
  $('#stopBtn').disabled = true;
  drawLoopActive = false;
  clearInterval(timerTick);
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  setStageStatus('正在生成视频');
}

function resetRecordingControls() {
  drawLoopActive = false;
  clearInterval(timerTick);
  $('#recordBtn').hidden = false;
  $('#recordBtn').disabled = !contentReady;
  $('#stopBtn').hidden = true;
  $('#stopBtn').disabled = false;
  $('#backBtn').disabled = false;
  $('#recordingPill').classList.remove('show');
  $('#timer').textContent = '00:00';
}

function finishRecording() {
  lastBlob = new Blob(chunks, { type: lastMime });
  canvasStream?.getVideoTracks().forEach((track) => track.stop());
  canvasStream?.getAudioTracks().forEach((track) => canvasStream.removeTrack(track));
  canvasStream = null;
  $('#resultInfo').textContent = lastExt.toUpperCase() + ' · ' + fmtBytes(lastBlob.size);
  $('#resultChip').classList.add('show');
  resetRecordingControls();
  setStageStatus(lastExt === 'mp4' ? '录制完成 · MP4 已生成' : '录制完成 · 当前浏览器输出 WebM', 'ok');
}

function downloadRecording() {
  if (!lastBlob) return;
  const url = URL.createObjectURL(lastBlob);
  const anchor = document.createElement('a');
  anchor.href = url;
  anchor.download = currentName + '-recording.' + lastExt;
  anchor.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function leavePreview() {
  if (mediaRecorder?.state === 'recording') return;
  setPrompterOpen(false);
  releaseMedia();
  contentReady = false;
  previewView.hidden = true;
  uploadView.hidden = false;
  $('#resultChip').classList.remove('show');
}

$('#fileInput').addEventListener('change', (event) => chooseFile(event.target.files[0]));
$('#confirmBtn').addEventListener('click', enterPreview);
$('#cameraBtn').addEventListener('click', () => {
  if (hasLiveTrack(cameraStream, 'video')) disableCamera();
  else enableCamera(false);
});
$('#recordBtn').addEventListener('click', startRecording);
$('#stopBtn').addEventListener('click', stopRecording);
$('#downloadBtn').addEventListener('click', downloadRecording);
$('#backBtn').addEventListener('click', leavePreview);
$('#scriptBtn').addEventListener('click', () => setPrompterOpen($('#teleprompter').hidden));
$('#closeScriptBtn').addEventListener('click', () => setPrompterOpen(false));
$('#collapseScriptBtn').addEventListener('click', togglePrompterCollapse);
$('#readScriptBtn').addEventListener('click', () => {
  if (!$('#scriptInput').value.trim()) {
    $('#scriptInput').focus();
    return;
  }
  setPrompterMode('read');
});
$('#editScriptBtn').addEventListener('click', () => setPrompterMode('edit'));
$('#scrollScriptBtn').addEventListener('click', () => {
  if (promptRunning) stopPromptScroll();
  else startPromptScroll();
});
document.querySelectorAll('.speed-btn').forEach((button) => {
  button.addEventListener('click', () => {
    promptSpeed = button.dataset.speed;
    document.querySelectorAll('.speed-btn').forEach((item) => item.setAttribute('aria-pressed', String(item === button)));
  });
});

dropZone.addEventListener('dragover', (event) => { event.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', (event) => {
  event.preventDefault();
  dropZone.classList.remove('drag');
  chooseFile(event.dataTransfer.files[0]);
});

window.addEventListener('beforeunload', releaseMedia);
</script>
</body>
</html>
